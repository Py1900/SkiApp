// flatten alle Karten mit Kategorie-Info
function buildDeck() {
  const deck = [];
  KATEGORIEN.forEach(kat => {
    kat.karten.forEach((k, i) => {
      deck.push({
        ...k,
        katId: kat.id,
        katIcon: kat.icon,
        katLabel: kat.label,
        katColor: kat.color,
        katDark: kat.dark,
        id: `${kat.id}-${i}`
      });
    });
  });
  // shuffle
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}
